; Dummer — ESP32 drum machine
; See SPEC.md §15 for the source of truth on build envs.

[platformio]
default_envs = debug

[env]
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Iinclude
    -Isrc
    -Igenerated

; Strict warnings — applied only to project sources, not framework/lib headers.
build_src_flags =
    -Wall
    -Wextra
    -Wshadow
    -Wnon-virtual-dtor
    -Wold-style-cast
    -Wcast-align
    -Woverloaded-virtual
    -Wno-unused-parameter

; Static-analysis: `pio check -e release`
check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=warning,style,performance,portability --inline-suppr --suppress=missingIncludeSystem
    clangtidy: --config-file=.clang-tidy
check_src_filters = +<src/> +<include/> +<test/>
check_skip_packages = yes

; ===== Production firmware =====
[env:release]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<*> +<../generated/>
build_flags =
    ${env.build_flags}
    -O3
    -DBUILD_ESP32
    -DBUILD_RELEASE
    -DLOG_LEVEL=0
monitor_speed = 115200

; ===== Debug firmware (default) =====
[env:debug]
platform = espressif32
board = esp32dev
framework = arduino
build_type = debug
build_src_filter = +<*> +<../generated/>
build_flags =
    ${env.build_flags}
    -Og
    -g3
    -DBUILD_ESP32
    -DBUILD_DEBUG
    -DLOG_LEVEL=3
monitor_speed = 115200
monitor_filters = log2file, time

; ===== Host unit tests =====
[env:native_test]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_button_manager, test_voice_pool, test_mixer, test_led_manager, test_reverb
build_flags =
    ${env.build_flags}
    -DBUILD_NATIVE_TEST
    -DLOG_LEVEL=3
    -Wall
    -Wextra
; Unity's TEST_ASSERT_* macros expand to C-style casts; we can't fix those,
; so drop -Wold-style-cast for the test env. Test files mix C and C++, so
; C++-only warnings (-Wnon-virtual-dtor, -Woverloaded-virtual) are out too.
build_src_flags =
    -Wall
    -Wextra
