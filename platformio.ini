; Dummer — ESP32 drum machine
; See SPEC.md §15 for the source of truth on build envs.

[platformio]
default_envs = debug

[env]
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Iinclude
    -Isrc

; ===== Production firmware =====
[env:release]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    ${env.build_flags}
    -O3
    -DBUILD_ESP32
    -DBUILD_RELEASE
    -DLOG_LEVEL=0
monitor_speed = 115200

; ===== Debug firmware (default) =====
[env:debug]
platform = espressif32
board = esp32dev
framework = arduino
build_type = debug
build_flags =
    ${env.build_flags}
    -Og
    -g3
    -DBUILD_ESP32
    -DBUILD_DEBUG
    -DLOG_LEVEL=3
monitor_speed = 115200
monitor_filters = log2file, time

; ===== Host unit tests =====
[env:native_test]
platform = native
test_framework = unity
test_build_src = yes
test_filter = test_button_manager
build_flags =
    ${env.build_flags}
    -DBUILD_NATIVE_TEST
    -DLOG_LEVEL=3
    -Wall
    -Wextra
